# Unique project name
name: kde

# Required BuildStream version
min-version: 2.5

# Subdirectory where elements are stored
element-path: elements

(@):
- freedesktop-sdk.bst:include/runtime.yml
- include/aliases.yml

# Options to specify for the project, these provide
# command line switches which control the behavior of
# conditional directives in the element.bst files.
#
options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
    - aarch64
    - x86_64
    - riscv64
  minimal_vm:
    type: flags
    description: Parts to include in minimal vm builds (firmware, locale).
    values:
    - firmware
    - locale
    default:
    - firmware
    - locale

sandbox:
  build-arch: '%{arch}'

variables:
  branch: 'qt6.11'
  strip-binaries: ''
  fsdk-branch: master
  runstatedir: "/run"

environment:
# These need getting set so that projects can run tools and not get weird warnings.
# trigger to adding this was qca's usage of qmake -query (which in turn comes from Qt upstream)
  LANG: C.UTF-8
  LC_ALL: C.UTF-8

plugins:
- origin: local
  path: plugins/sources
  sources:
  - kde_builder

- origin: junction
  junction: plugins/buildstream-plugins.bst
  elements:
  - autotools
  - meson
  - cmake
  - make
  - pip
  sources:
  - patch
  - git

- origin: junction
  junction: plugins/buildstream-plugins-community.bst
  elements:
  - pyproject
  - flatpak_image
  - flatpak_repo
  - collect_manifest
  - collect_integration
  sources:
  - cargo2
  - git_repo
  - zip

- origin: junction
  junction: freedesktop-sdk.bst
  elements:
  - collect_initial_scripts
  - uki_builder


sources:
  git_repo:
    config:
      ref-format: git-describe

artifacts:
- url: https://cache.freedesktop-sdk.io:11001
  connection-config:
    keepalive-time: 60
- url: http://49.12.0.241:11001
  connection-config:
    keepalive-time: 60

source-caches:
- url: https://cache.freedesktop-sdk.io:11001
  connection-config:
    keepalive-time: 60
- url: http://49.12.0.241:11001
  connection-config:
    keepalive-time: 60
